name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dart:
    name: Dart analysis & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test plugin package
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No root test/ directory; skipping plugin package tests."
          fi

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Test example app
        working-directory: example
        run: flutter test

      - name: Verify pub package
        run: dart pub publish --dry-run

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Check plugin crate
        run: cargo check --manifest-path rust/Cargo.toml --target x86_64-unknown-linux-gnu

      - name: Check core crate
        run: cargo check --manifest-path rust_core/Cargo.toml

      - name: Clippy (core)
        run: cargo clippy --manifest-path rust_core/Cargo.toml -- -D warnings

  rust-macos:
    name: Rust checks (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Check plugin crate
        run: cargo check --manifest-path rust/Cargo.toml --target aarch64-apple-darwin

      - name: Check core crate
        run: cargo check --manifest-path rust_core/Cargo.toml
